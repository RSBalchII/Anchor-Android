name: Build Android APK

on:
  workflow_dispatch: # This allows you to manually trigger the build from your phone

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Matches your engine's node18-linux-arm64 target

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Sync and Build Engine Binary
        # Runs the script your agent made yesterday to pull the engine and compile the binary
        run: |
          chmod +x sync_engine.sh
          ./sync_engine.sh

      - name: Setup Java (For Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter APK
        working-directory: ./flutter_app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anchor-Engine-Android-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk