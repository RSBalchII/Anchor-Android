name: anchor_android
description: Anchor Android - Pure WebView wrapper over anchor-engine-node
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  path_provider: ^2.1.1   # For app-private dir where we extract the engine binary
  http: ^1.1.0             # For polling localhost:3160/health before loading WebView

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/engine/   # Contains anchor-engine linux-arm64 binary (built by sync_engine.sh)

